<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đấu Trường Tri Thức - Sinh Hoạt Chi Bộ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --red-flag: #da251d; --yellow-star: #ffff00; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #da251d 0%, #a31a14 100%); color: #fff; text-align: center; margin: 0; padding: 10px; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Giao diện chung */
        .btn-red { background: var(--red-flag); color: white; border: 2px solid var(--yellow-star); padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        
        /* Giao diện iPad */
        .big-buzzer { width: 280px; height: 280px; border-radius: 50%; border: 10px solid white; background: radial-gradient(circle, #ff4d4d, #b30000); color: white; font-size: 2em; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .big-buzzer:active { transform: scale(0.95); }
        .mobile-opt { padding: 30px; font-size: 2.5em; color: white; border: 4px solid white; border-radius: 15px; margin: 10px; cursor: pointer; width: 40%; }

        /* Giao diện Máy tính (Admin) */
        #admin-screen { width: 95%; margin: auto; }
        .score-board { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .group-card { background: rgba(255, 255, 255, 0.15); border: 2px solid var(--yellow-star); padding: 15px; border-radius: 12px; width: 220px; transition: 0.3s; }
        .group-card.active { background: var(--yellow-star); color: var(--red-flag); transform: scale(1.1); box-shadow: 0 0 30px var(--yellow-star); }
        .group-card.disabled { opacity: 0.2; filter: grayscale(1); }
        
        #quiz-container { background: #fff; color: #333; width: 90%; max-width: 850px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option { padding: 15px; background: #f8f9fa; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2em; text-align: left; font-weight: bold; }
        .option.correct { background: #27ae60 !important; color: #fff; }
        .option.wrong { background: #e74c3c !important; color: #fff; }
    </style>
</head>
<body>

    <div id="role-selection" style="background: white; color: #333; padding: 40px; margin: 50px auto; width: 350px; border-radius: 20px;">
        <h2 style="color:var(--red-flag)">AI ĐANG MỞ MÁY?</h2>
        <button class="btn-red" onclick="selectRole('admin')">MÁY TÍNH (HIỂN THỊ CHÍNH)</button>
        <hr>
        <p>Chọn đội cho iPad/Điện thoại:</p>
        <button class="btn-red" onclick="selectRole('player', 0)">ĐỘI 1</button>
        <button class="btn-red" onclick="selectRole('player', 1)">ĐỘI 2</button>
        <button class="btn-red" onclick="selectRole('player', 2)">ĐỘI 3</button>
    </div>

    <div id="admin-screen" class="hidden">
        <h1 id="stage-title" style="color:var(--yellow-star); text-shadow: 2px 2px 4px #000;">CHẶNG 1: DẤU SON LỊCH SỬ</h1>
        
        <div class="score-board">
            <div id="card-0" class="group-card"><strong>ĐỘI TIÊN PHONG</strong><div id="score-0" style="font-size:2em">0</div></div>
            <div id="card-1" class="group-card"><strong>ĐỘI SÁNG TẠO</strong><div id="score-1" style="font-size:2em">0</div></div>
            <div id="card-2" class="group-card"><strong>ĐỘI QUYẾT THẮNG</strong><div id="score-2" style="font-size:2em">0</div></div>
        </div>

        <div id="video-zone" class="hidden">
            <video id="main-video" width="80%" controls style="border: 5px solid white; border-radius: 15px;"></video>
            <br><button class="btn-red" onclick="startStage3()">HẾT VIDEO -> SANG CHẶNG 3</button>
        </div>

        <div id="quiz-container">
            <div id="q-text" style="font-size:1.6em; color:var(--red-flag); font-weight:bold;"></div>
            <div id="options-grid" class="options-grid"></div>
            
            <div id="score-input-zone" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:15px;">
                <input type="number" id="judge-score" value="10" style="font-size:1.5em; width:80px; text-align:center;">
                <button class="btn-red" onclick="confirmScore()">XÁC NHẬN ĐIỂM</button>
            </div>
        </div>

        <div id="status-msg" style="font-size:1.8em; color:var(--yellow-star); font-weight:bold; margin:20px;"></div>
        <button id="btn-next" class="btn-red" onclick="controlNext()">CÂU TIẾP THEO</button>
    </div>

    <div id="player-screen" class="hidden">
        <h1 id="p-team-name" style="color:var(--yellow-star)">ĐỘI ...</h1>
        <div id="p-buzzer-zone">
            <button id="btn-buzzer" class="big-buzzer" onclick="pressBuzzer()">BẤM CHUÔNG</button>
        </div>
        <div id="p-answer-zone" class="hidden">
            <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                <button class="mobile-opt" style="background:#2980b9" onclick="submitAns(0)">A</button>
                <button class="mobile-opt" style="background:#27ae60" onclick="submitAns(1)">B</button>
                <button class="mobile-opt" style="background:#f39c12" onclick="submitAns(2)">C</button>
                <button class="mobile-opt" style="background:#8e44ad" onclick="submitAns(3)">D</button>
            </div>
        </div>
        <p id="p-msg" style="font-size: 2em; font-weight: bold; margin-top: 30px;"></p>
    </div>

    <audio id="snd-buzzer" src="https://assets.mixkit.co/active_storage/sfx/2962/2962-preview.mp3"></audio>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCr-SumbfkNMGbYkQ5hL9P8d86hGvBC1AI",
            authDomain: "hoithichibo.firebaseapp.com",
            databaseURL: "https://hoithichibo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hoithichibo",
            storageBucket: "hoithichibo.firebasestorage.app",
            messagingSenderId: "209464097119",
            appId: "1:209464097119:web:a9c78c7275f6854cd91eea"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Dữ liệu câu hỏi
        const dataQ = {
            s1: [
                { q: "Đảng Cộng sản Việt Nam được thành lập vào ngày, tháng, năm nào?", options: ["03/02/1929", "19/05/1930", "03/02/1930", "02/09/1945"], correct: 2, p: 10 },
				{ q: "Người sáng lập và rèn luyện Đảng Cộng sản Việt Nam là ai?", options: ["Trường Chinh", "Võ Nguyên Giáp", "Tôn Đức Thắng", "Hồ Chí Minh"], correct: 3, p: 10 },
				{ q: "Hội nghị hợp nhất các tổ chức cộng sản thành Đảng Cộng sản Việt Nam được tổ chức tại đâu?", options: ["Quảng Châu (Trung Quốc)", "Bắc Kinh (Trung Quốc)", "Hồng Kông (Trung Quốc)", "Hà Nội (Việt Nam)"], correct: 2, p: 10 },
				{ q: "Sự kiện lịch sử nào năm 1945 đánh dấu vai trò lãnh đạo quyết định của Đảng đối với dân tộc?", options: ["Chiến thắng Điện Biên Phủ", "Cách mạng Tháng Tám", "Tổng tiến công Tết Mậu Thân", "Ngày toàn quốc kháng chiến"], correct: 1, p: 10 },
				{ q: "Trong hai cuộc kháng chiến, Đảng đã lãnh đạo nhân dân ta giành thắng lợi trước ________.", options: ["Thực dân Pháp và phát xít Nhật", "Đế quốc Mỹ và phát xít Nhật", "Thực dân Pháp và đế quốc Mỹ", "Đế quốc Mỹ và thực dân Anh"], correct: 2, p: 10 },
				{ q: "Đại hội đại biểu toàn quốc lần thứ VI của Đảng (1986) có ý nghĩa lịch sử là:", options: ["Hoàn thành thống nhất đất nước", "Đề ra đường lối công nghiệp hóa", "Khởi xướng công cuộc Đổi mới đất nước", "Mở rộng quan hệ đối ngoại"], correct: 2, p: 10 },
				{ q: "Tính đến năm 2026, Đảng Cộng sản Việt Nam đã trải qua bao nhiêu năm xây dựng và phát triển?", options: ["90 năm", "95 năm", "96 năm", "100 năm"], correct: 2, p: 10 },
				{ q: "Một trong những nguyên tắc tổ chức cơ bản của Đảng Cộng sản Việt Nam là:", options: ["Dân chủ tuyệt đối", "Tập trung dân chủ", "Cá nhân phụ trách", "Đa số quyết định"], correct: 1, p: 10 },
				{ q: "Trong giai đoạn hiện nay, nhiệm vụ trọng tâm của Đảng là xây dựng Đảng trong sạch, ________, đồng thời phát triển kinh tế – xã hội và nâng cao đời sống nhân dân.", options: ["đoàn kết", "vững mạnh", "toàn diện", "hiện đại"], correct: 1, p: 10 },
				{ q: "Đối với ngành giáo dục, vai trò lãnh đạo của Đảng thể hiện rõ nhất ở nội dung nào?", options: ["Chỉ đạo thi cử, kiểm tra", "Quản lý cơ sở vật chất trường học", "Định hướng giáo dục toàn diện, giáo dục đạo đức – lý tưởng cho thế hệ trẻ", "Đổi mới hình thức khen thưởng"], correct: 2, p: 10 },
				{ q: "Chủ đề Đại hội XIV của Đảng là:", options: ["Dưới lá cờ vẻ vang của Đảng, chung sức, đồng lòng quyết tâm thực hiện thắng lợi các mục tiêu phát triển đất nước đến năm 2030", "Dưới lá cờ vẻ vang của Đảng, chung sức, đồng lòng quyết tâm thực hiện thắng lợi các mục tiêu phát triển đất nước đến năm 2030; tự cường, tự tin, tiến mạnh trong kỷ nguyên vươn mình của dân tộc", "Dưới lá cờ vẻ vang của Đảng, chung sức, đồng lòng quyết tâm thực hiện thắng lợi các mục tiêu phát triển đất nước đến năm 2030; vững bước đi lên chủ nghĩa xã hội", "Dưới lá cờ vẻ vang của Đảng, chung sức, đồng lòng quyết tâm thực hiện thắng lợi các mục tiêu phát triển đất nước đến năm 2030; tự cường, tự tin, tiến mạnh trong kỷ nguyên vươn mình của dân tộc, vì hòa bình, độc lập, dân chủ, giàu mạnh, phồn vinh, văn minh, hạnh phúc, vững bước đi lên chủ nghĩa xã hội"], correct: 3, p: 10 },
				{ q: "Phương châm Đại hội XIV của Đảng là:", options: ["Đoàn kết - Dân chủ - Kỷ cương - Sáng tạo - Phát triển", "Tăng cường xây dựng Đảng trong sạch, vững mạnh", "Đoàn kết - Dân chủ - Kỷ cương - Đột phá - Phát triển", "Đoàn kết - Dân chủ - Kỷ cương - Vững mạnh - Phát triển"], correct: 2, p: 10 },
				{ q: "Đồng chí giữ chức vụ Tổng Bí thư Ban Chấp hành Trung ương Đảng khóa XIV là đồng chí:", options: ["Đồng chí Phạm Minh Chính", "Đồng chí Tô Lâm", "Đồng chí Trần Sỹ Thanh", "Đồng chí Trần Văn Bắc"], correct: 1, p: 10 },
				{ q: "Trong nhiệm kỳ Đại hội XIV đã đề ra bao nhiêu nhiệm vụ trọng tâm:", options: ["4 nhiệm vụ trọng tâm", "5 nhiệm vụ trọng tâm", "6 nhiệm vụ trọng tâm", "7 nhiệm vụ trọng tâm"], correct: 2, p: 10 },
				{ q: "Trong nhiệm kỳ Đại hội XIV của Đảng cần tập trung vào mấy đột phá chiến lược?", options: ["1 đột phá chiến lược", "2 đột phá chiến lược", "3 đột phá chiến lược", "4 đột phá chiến lược"], correct: 2, p: 10 }
            ],
            s3: [
                { q: "Theo đồng chí, trong giai đoạn hiện nay, vai trò nêu gương của người đảng viên trong trường tiểu học cần được thể hiện rõ nhất ở nội dung nào?", p: 0 },
				{ q: "Từ truyền thống 96 năm của Đảng, đồng chí rút ra bài học gì cho bản thân trong thực hiện nhiệm vụ được giao?", p: 0 },
				{ q: "Là đảng viên, đồng chí cần làm gì để góp phần xây dựng chi bộ trong sạch, vững mạnh ngay từ những việc nhỏ hằng ngày?", p: 0 },
				{ q: "Theo đồng chí, mỗi đảng viên cần làm gì để nâng cao chất lượng sinh hoạt chi bộ trong thời gian tới?", p: 0 },
				{ q: "Đồng chí cam kết một việc làm cụ thể của bản thân trong năm học này để chào mừng thành công Đại hội XIV.", p: 0 }
            ]
        };

        let myRole = '', myIdx = -1, curS = 1, curQ = -1, scores = [0,0,0], groupStatus = [true,true,true], winnerIdx = null;

        function selectRole(role, idx) {
            myRole = role; myIdx = idx;
            document.getElementById('role-selection').classList.add('hidden');
            if(role === 'admin') {
                document.getElementById('admin-screen').classList.remove('hidden');
                initAdmin(); 
                db.ref().set({ buzzer: null, ans: null, stage: 1, qIdx: -1 }); // Reset database
                controlNext();
            } else {
                document.getElementById('player-screen').classList.remove('hidden');
                document.getElementById('p-team-name').innerText = "ĐỘI " + (idx + 1);
                initPlayer();
            }
        }

        // --- HÀM CHO MÁY TÍNH ---
        function initAdmin() {
            db.ref('buzzer').on('value', snap => {
                winnerIdx = snap.val()?.idx;
                if(winnerIdx !== undefined && winnerIdx !== null) {
                    document.getElementById('snd-buzzer').play();
                    document.getElementById(`card-${winnerIdx}`).classList.add('active');
                    document.getElementById('status-msg').innerText = `🔔 ĐỘI ${winnerIdx + 1} GIÀNH QUYỀN!`;
                    if(curS === 3) document.getElementById('score-input-zone').classList.remove('hidden');
                }
            });

            db.ref('ans').on('value', snap => {
                const data = snap.val();
                if(!data || curS !== 1) return;
                const q = dataQ.s1[curQ];
                if(data.choice === q.correct) {
                    scores[data.idx] += 10;
                    document.getElementById('status-msg').innerText = "✅ CHÍNH XÁC! +10 ĐIỂM";
                    showCorrect(q.correct);
                    setTimeout(controlNext, 2000);
                } else {
                    document.getElementById('status-msg').innerText = `❌ SAI RỒI! ĐỘI ${data.idx+1} BỊ LOẠI CÂU NÀY.`;
                    groupStatus[data.idx] = false;
                    db.ref('buzzer').set(null); 
                    db.ref('ans').set(null);
                    updateUI();
                }
            });
        }

        function controlNext() {
            curQ++;
            if(curS === 1 && curQ >= dataQ.s1.length) { startStage2(); return; }
            if(curS === 3 && curQ >= dataQ.s3.length) { alert("HẾT CUỘC THI!"); return; }
            
            groupStatus = [true, true, true];
            db.ref().update({ buzzer: null, ans: null, qIdx: curQ, stage: curS });
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('quiz-container');
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = "ĐANG CHỜ BẤM CHUÔNG...";
            
            if(curS === 1) {
                const q = dataQ.s1[curQ];
                document.getElementById('q-text').innerText = `CÂU ${curQ+1}: ${q.q}`;
                const grid = document.getElementById('options-grid');
                grid.innerHTML = '';
                q.options.forEach((opt, i) => grid.innerHTML += `<div class="option" id="o-${i}">${String.fromCharCode(65+i)}. ${opt}</div>`);
            } else if(curS === 3) {
                const q = dataQ.s3[curQ];
                document.getElementById('q-text').innerText = `CÂU HỎI TỰ LUẬN: ${q.q}`;
                document.getElementById('options-grid').innerHTML = '<p>Đội giành chuông trả lời miệng. Giám khảo chấm điểm.</p>';
            }

            scores.forEach((s, i) => {
                document.getElementById(`score-${i}`).innerText = s;
                document.getElementById(`card-${i}`).className = 'group-card' + (groupStatus[i] ? '' : ' disabled');
            });
        }

        function showCorrect(idx) {
            document.getElementById(`o-${idx}`).classList.add('correct');
        }

        function confirmScore() {
            const pts = parseInt(document.getElementById('judge-score').value);
            scores[winnerIdx] += pts;
            document.getElementById('score-input-zone').classList.add('hidden');
            controlNext();
        }

        function startStage2() {
            curS = 2;
            document.getElementById('stage-title').innerText = "CHẶNG 2: HÀNH TRÌNH VẺ VANG";
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('video-zone').classList.remove('hidden');
            document.getElementById('main-video').src = "video_tu_lieu.mp4"; // Thay tên file ở đây
        }

        function startStage3() {
            curS = 3; curQ = -1;
            document.getElementById('stage-title').innerText = "CHẶNG 3: TIẾP BƯỚC NIỀM TIN";
            document.getElementById('video-zone').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            controlNext();
        }

        // --- HÀM CHO iPAD ---
        function initPlayer() {
            db.ref().on('value', snap => {
                const data = snap.val();
                const bBtn = document.getElementById('btn-buzzer');
                const pMsg = document.getElementById('p-msg');
                
                if(data.buzzer) {
                    bBtn.disabled = true;
                    if(data.buzzer.idx === myIdx) {
                        pMsg.innerText = "MỜI TRẢ LỜI!";
                        if(data.stage === 1) {
                            document.getElementById('p-buzzer-zone').classList.add('hidden');
                            document.getElementById('p-answer-zone').classList.remove('hidden');
                        }
                    } else {
                        pMsg.innerText = "ĐỘI KHÁC ĐANG GIÀNH QUYỀN...";
                    }
                } else {
                    bBtn.disabled = false;
                    pMsg.innerText = "SẴN SÀNG!";
                    document.getElementById('p-buzzer-zone').classList.remove('hidden');
                    document.getElementById('p-answer-zone').classList.add('hidden');
                }
            });
        }

        function pressBuzzer() {
            db.ref('buzzer').transaction(cur => cur === null ? { idx: myIdx } : undefined);
        }

        function submitAns(choice) {
            db.ref('ans').set({ idx: myIdx, choice: choice });
        }
    </script>
</body>
</html>
