<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu Trường Tri Thức - Sinh Hoạt Chi Bộ</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --red-flag: #da251d; --yellow-star: #ffff00; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #da251d 0%, #a31a14 100%); 
            color: #fff; text-align: center; margin: 0; padding: 10px; min-height: 100vh;
        }
        .hidden { display: none !important; }
        
        /* Giao diện máy tính */
        #admin-panel { max-width: 1000px; margin: auto; }
        .score-board { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .group-card { background: rgba(255,255,255,0.15); border: 2px solid var(--yellow-star); padding: 15px; border-radius: 12px; width: 200px; }
        .group-card.active { background: var(--yellow-star); color: var(--red-flag); transform: scale(1.1); box-shadow: 0 0 30px var(--yellow-star); }
        
        /* Giao diện nút bấm cho iPad/Phone */
        #mobile-buzzer { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .buzzer-btn { 
            width: 250px; height: 250px; border-radius: 50%; border: 10px solid white;
            background: radial-gradient(circle, #ff4d4d, #b30000); color: white;
            font-size: 2em; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            active: transform: scale(0.9);
        }
        .buzzer-btn:disabled { background: #666; opacity: 0.5; cursor: not-allowed; }

        #quiz-container { background: white; color: #333; padding: 20px; border-radius: 15px; margin: 20px auto; max-width: 800px; }
        .option { padding: 15px; background: #f0f0f0; margin: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .option.correct { background: #27ae60 !important; color: white; }
        .option.wrong { background: #e74c3c !important; color: white; }
    </style>
</head>
<body>

    <div id="role-selection">
        <h2>BẠN LÀ AI?</h2>
        <button onclick="initRole('admin')" style="padding:20px; margin:10px;">MÁY TÍNH (TRÌNH CHIẾU)</button><br>
        <button onclick="initRole('player', 0)" style="padding:20px; margin:10px;">ĐỘI TIÊN PHONG (IPAD 1)</button>
        <button onclick="initRole('player', 1)" style="padding:20px; margin:10px;">ĐỘI SÁNG TẠO (IPAD 2)</button>
        <button onclick="initRole('player', 2)" style="padding:20px; margin:10px;">ĐỘI QUYẾT THẮNG (IPAD 3)</button>
    </div>

    <div id="admin-panel" class="hidden">
        <h1 style="color:var(--yellow-star)">HỘI THI CHI BỘ TRỰC TUYẾN</h1>
        <div class="score-board">
            <div id="card-0" class="group-card"><strong>ĐỘI TIÊN PHONG</strong><div id="score-0" style="font-size:2em">0</div></div>
            <div id="card-1" class="group-card"><strong>ĐỘI SÁNG TẠO</strong><div id="score-1" style="font-size:2em">0</div></div>
            <div id="card-2" class="group-card"><strong>ĐỘI QUYẾT THẮNG</strong><div id="score-2" style="font-size:2em">0</div></div>
        </div>
        
        <div id="quiz-container">
            <h2 id="q-text">Đang đợi câu hỏi...</h2>
            <div id="options-grid"></div>
            <button onclick="resetBuzzer()" style="margin-top:20px; padding:10px;">MỞ LẠI CHUÔNG CHO CÂU TIẾP THEO</button>
        </div>
        <div id="status" style="font-size:1.5em; color:var(--yellow-star); margin-top:20px;"></div>
    </div>

    <div id="mobile-buzzer" class="hidden">
        <h2 id="team-label">TÊN ĐỘI</h2>
        <button id="main-buzzer" class="buzzer-btn" onclick="sendBuzzer()">BẤM CHUÔNG</button>
        <p id="msg-to-player" style="margin-top:20px;"></p>
    </div>

    <audio id="snd-buzzer" src="https://assets.mixkit.co/active_storage/sfx/2962/2962-preview.mp3"></audio>

    <script>
        // CẤU HÌNH FIREBASE CỦA ĐỒNG CHÍ
        const firebaseConfig = {
            apiKey: "AIzaSyCr-SumbfkNMGbYkQ5hL9P8d86hGvBC1AI",
            authDomain: "hoithichibo.firebaseapp.com",
            databaseURL: "https://hoithichibo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hoithichibo",
            storageBucket: "hoithichibo.firebasestorage.app",
            messagingSenderId: "209464097119",
            appId: "1:209464097119:web:a9c78c7275f6854cd91eea"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myRole = '';
        let myTeamIndex = -1;
        const teamNames = ["ĐỘI TIÊN PHONG", "ĐỘI SÁNG TẠO", "ĐỘI QUYẾT THẮNG"];

        function initRole(role, index) {
            myRole = role;
            document.getElementById('role-selection').classList.add('hidden');
            if(role === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
                listenBuzzer();
            } else {
                myTeamIndex = index;
                document.getElementById('mobile-buzzer').classList.remove('hidden');
                document.getElementById('team-label').innerText = teamNames[index];
                listenStatus();
            }
        }

        // GỬI TÍN HIỆU BẤM CHUÔNG (Dành cho iPad)
        function sendBuzzer() {
            db.ref('currentBuzzer').transaction((current) => {
                if (current === null) {
                    return { team: myTeamIndex, name: teamNames[myTeamIndex], time: Date.now() };
                }
                return; // Đã có người bấm trước, không ghi đè
            });
        }

        // LẮNG NGHE CHUÔNG (Dành cho máy tính)
        function listenBuzzer() {
            db.ref('currentBuzzer').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('snd-buzzer').play();
                    document.getElementById(`card-${data.team}`).classList.add('active');
                    document.getElementById('status').innerText = "🔔 " + data.name + " ĐÃ GIÀNH QUYỀN!";
                } else {
                    // Reset trạng thái
                    for(let i=0; i<3; i++) document.getElementById(`card-${i}`).classList.remove('active');
                    document.getElementById('status').innerText = "MỜI CÁC ĐỘI SẴN SÀNG...";
                }
            });
        }

        // LẮNG NGHE TRẠNG THÁI KHÓA/MỞ NÚT (Dành cho iPad)
        function listenStatus() {
            db.ref('currentBuzzer').on('value', (snapshot) => {
                const btn = document.getElementById('main-buzzer');
                if (snapshot.val() !== null) {
                    btn.disabled = true;
                    document.getElementById('msg-to-player').innerText = "ĐÃ CÓ ĐỘI BẤM!";
                } else {
                    btn.disabled = false;
                    document.getElementById('msg-to-player').innerText = "HÃY SẴN SÀNG!";
                }
            });
        }

        // RESET CHUÔNG CHO CÂU TIẾP THEO (Dành cho máy tính)
        function resetBuzzer() {
            db.ref('currentBuzzer').set(null);
        }
    </script>
</body>
</html>
